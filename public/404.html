<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Offside · The Road to Glory</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Unbounded:wght@600;700;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #09090b;
    color: #f4f4f5;
    font-family: "Inter", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(1200px 800px at 50% 45%, rgba(246,196,83,0.08), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
  }

  .code {
    font-family: "Unbounded", sans-serif;
    font-size: clamp(8rem, 18vw, 16rem);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(180deg, #ffdf8e 0%, #f6c453 45%, #b8862f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 6px 30px rgba(246,196,83,0.2));
  }

  .tag {
    display: inline-block;
    font-family: "Inter", sans-serif;
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #f6c453;
    padding: 0.35rem 1rem;
    border: 1px solid rgba(246,196,83,0.25);
    border-radius: 9999px;
    margin-bottom: 1.25rem;
  }

  .title {
    font-family: "Unbounded", sans-serif;
    font-size: clamp(1.5rem, 3vw, 2.25rem);
    font-weight: 700;
    color: #e11d48;
    margin: 1.25rem 0 1rem;
  }

  .desc {
    color: #71717a;
    font-size: clamp(0.875rem, 1.25vw, 1rem);
    line-height: 1.7;
    max-width: 460px;
    margin: 0 auto 2.5rem;
  }

  .desc b { color: #f6c453; font-weight: 600; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: "Unbounded", sans-serif;
    font-size: 0.8125rem;
    font-weight: 700;
    color: #09090b;
    text-decoration: none;
    padding: 0.9rem 2.2rem;
    background: linear-gradient(135deg, #ffdf8e, #f6c453);
    border-radius: 9999px;
    transition: all 0.25s;
    box-shadow: 0 0 25px rgba(246,196,83,0.18);
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 35px rgba(246,196,83,0.3);
  }

  .footer {
    margin-top: 3rem;
    font-size: 0.6875rem;
    color: #3f3f46;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<main>
  <div class="tag">VAR Check</div>
  <div class="code">404</div>
  <div class="title">Offside</div>
  <p class="desc">
    The flag is up. This page was <b>caught beyond the last defender</b> and doesn't exist. Head back to the pitch.
  </p>
  <a href="/" class="btn">Back to the Bracket</a>
  <div class="footer">VAR confirms: no goal</div>
</main>
</body>
</html>
