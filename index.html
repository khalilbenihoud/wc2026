<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  --bg: #09090b;
  --ink: #f3efe4;
  --gold: #d9b45a;
  --gold-20: rgba(217,180,90,0.2);
  --mx: 0.5; --my: 0.5;
  background-color:var(--bg);
  background-image:
    radial-gradient(1100px 820px at calc(var(--mx)*100%) calc(var(--my)*100%), rgba(217,180,90,0.08), transparent 62%),
    linear-gradient(180deg, #0c0c0e, var(--bg) 66%);
  color:var(--ink);
  font-family:"Inter",ui-sans-serif,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  transition:filter 0.9s cubic-bezier(0.4,0,0.2,1);
}
body.exiting{filter:blur(40px) brightness(0.3)}

.corner{
  position:fixed;z-index:3;top:2rem;
  font-size:0.625rem;letter-spacing:0.22em;text-transform:uppercase;
  font-weight:500;color:var(--ink);opacity:0.45;
}
.corner.tl{left:2rem}.corner.tr{right:2rem}

main{
  position:fixed;inset:0;z-index:2;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.8s ease-out;
}
body.exiting main{opacity:0}

.loader{
  position:relative;z-index:3;display:flex;flex-direction:column;
  align-items:center;gap:1.25rem;opacity:1;
  transition:opacity 0.5s ease-out;
}
.loader.hidden{opacity:0;pointer-events:none}
.loader-year{
  font-family:"Unbounded",sans-serif;font-size:clamp(2.5rem,6vw,4.5rem);
  font-weight:600;color:var(--gold);line-height:1;
  font-variant-numeric:tabular-nums;letter-spacing:-0.02em;
}
.loader-bar-track{
  width:min(18rem,60vw);height:1px;background:var(--gold-20);
  border-radius:1px;overflow:hidden;
}
.loader-bar-fill{
  height:100%;background:var(--gold);width:0%;
  border-radius:1px;transition:width 0.05s linear;
}
.loader-label{
  font-size:0.6875rem;letter-spacing:0.25em;text-transform:uppercase;
  font-weight:500;color:var(--ink);opacity:0.5;
}

.title-block{
  position:absolute;z-index:3;display:flex;flex-direction:column;
  align-items:center;gap:1rem;text-align:center;padding:0 1.5rem;
  opacity:0;transform:translateY(8px);
  transition:opacity 0.7s ease-out,transform 0.7s ease-out;
  pointer-events:none;
}
.title-block.visible{
  opacity:1;transform:translateY(0);pointer-events:auto;
}

.eyebrow{
  display:flex;align-items:center;gap:1rem;
  font-size:0.625rem;letter-spacing:0.26em;font-weight:600;
  color:var(--ink);opacity:0.5;white-space:nowrap;
}
.eyebrow .rule{flex:1;height:1px;background:var(--gold);opacity:0.25;min-width:1.5rem}

.title{
  font-family:"Unbounded",sans-serif;
  font-size:clamp(2rem,5.5vw,3.75rem);font-weight:600;
  line-height:1.15;color:var(--ink);letter-spacing:0.04em;word-spacing:0.2em;
  overflow:hidden;
}
.title .char{
  display:inline-block;transform:translateY(100%);opacity:0;
  transition:transform 0.5s cubic-bezier(0.16,1,0.3,1),opacity 0.3s ease;
}
.title .char.show{transform:translateY(0);opacity:1}

.title-br{display:none}

.subline{
  max-width:36rem;font-size:0.9375rem;line-height:1.6;
  color:var(--ink);opacity:0.55;font-weight:400;
}

.cta{
  display:inline-flex;align-items:center;gap:0.5rem;
  margin-top:0.5rem;padding:0.75rem 2rem;
  border:1px solid var(--gold-20);border-radius:9999px;
  font-family:"Unbounded",sans-serif;font-size:0.75rem;font-weight:500;
  letter-spacing:0.08em;color:var(--ink);text-decoration:none;
  cursor:pointer;position:relative;overflow:hidden;isolation:isolate;
  transition:border-color 0.3s ease,color 0.3s ease;
  background:transparent;outline:none;
}
.cta::before{
  content:"";position:absolute;inset:0;z-index:-1;
  background:var(--gold);transform:translateX(-100%);opacity:0;
  border-radius:inherit;
  transition:transform 0.45s cubic-bezier(0.16,1,0.3,1),opacity 0.2s ease;
}
.cta:hover::before,.cta:focus-visible::before{transform:translateX(0);opacity:1}
.cta:hover,.cta:focus-visible{border-color:var(--gold);color:var(--bg)}
.cta:focus-visible{box-shadow:0 0 0 3px var(--gold-20)}
.cta .arrow{
  display:inline-block;transition:transform 0.3s ease;
}
.cta:hover .arrow,.cta:focus-visible .arrow{transform:translateX(4px)}

.skip-link{
  position:fixed;bottom:3rem;left:50%;z-index:5;
  transform:translateX(-50%);
  font-size:0.625rem;letter-spacing:0.18em;
  color:var(--ink);opacity:0.2;text-decoration:none;
  transition:opacity 0.4s ease;cursor:pointer;
  font-family:"Inter",sans-serif;
}
.skip-link:hover,.skip-link:focus-visible{opacity:0.6;outline:none}

.years-strip{
  position:fixed;bottom:1.75rem;left:50%;z-index:3;
  transform:translateX(-50%);display:flex;align-items:center;
  gap:0.875rem;font-size:0.625rem;letter-spacing:0.18em;
  font-weight:500;color:var(--ink);opacity:0.28;
  max-width:90vw;overflow-x:auto;white-space:nowrap;
  scrollbar-width:none;-ms-overflow-style:none;
  padding:0 1rem;
}
.years-strip::-webkit-scrollbar{display:none}
.yr-live{
  color:var(--gold);opacity:1;display:inline-flex;
  align-items:center;gap:0.375rem;
}
.live-dot{
  width:5px;height:5px;border-radius:50%;background:var(--gold);
  display:inline-block;
}
@keyframes pulse-dot{
  0%,100%{opacity:1;box-shadow:0 0 0 0 var(--gold)}
  50%{opacity:0.6;box-shadow:0 0 0 4px transparent}
}
.live-dot{animation:pulse-dot 2s ease-in-out infinite}

/* ---- Responsive ---- */
@media(max-width:640px){
  .corner{display:none !important}
  .title-br{display:block;width:100%;height:0}
  .years-strip{opacity:0.12;font-size:0.5rem;gap:0.5rem;bottom:1rem}
  .subline{font-size:0.8125rem}
  .eyebrow{font-size:0.5625rem;gap:0.5rem}
  .eyebrow .rule{min-width:0.75rem}
  .cta{font-size:0.6875rem;padding:0.65rem 1.5rem}
  .skip-link{bottom:2.5rem}
}

/* ---- Reduced motion ---- */
@media(prefers-reduced-motion:reduce){
  .live-dot{animation:none !important;box-shadow:none !important}
  .loader-bar-fill{transition:none !important}
  .title .char{transition:none !important}
  .cta::before{transition:none !important}
  body{transition:none !important}
  body.exiting{filter:brightness(0)}
  main{transition:none !important}
}
</style>
</head>
<body>

<div class="corner tl">Archive · Est. 1934</div>
<div class="corner tr">2026 — Bracket Live</div>

<main>
  <div class="loader" id="loader" role="status" aria-live="polite" aria-label="Opening the archive">
    <div class="loader-year" id="loaderYear">1934</div>
    <div class="loader-bar-track" aria-hidden="true">
      <div class="loader-bar-fill" id="loaderBar"></div>
    </div>
    <div class="loader-label">Opening the archive</div>
  </div>

  <div class="title-block" id="titleBlock">
    <div class="eyebrow">
      <span class="rule"></span>
      FIFA WORLD CUP KNOCKOUT ARCHIVE
      <span class="rule"></span>
    </div>
    <h1 class="title" id="title"></h1>
    <p class="subline">Every knockout bracket since 1934, drawn as a single
      radial map from the first round of sixteen to the final whistle.</p>
    <a class="cta" id="cta" href="/app.html" tabindex="-1">
      ENTER THE ARCHIVE <span class="arrow"><svg width="14" height="11" viewBox="0 0 18.5 14.8"><path d="M10.7 14.8c.24 0 .44-.09.64-.27l6.5-6.48c.19-.19.29-.41.29-.66 0-.24-.1-.47-.29-.65L11.37.29A.85.85 0 0010.71 0a.83.83 0 00-.85.84c0 .23.08.46.24.61l2.18 2.23 4.08 3.72-4.08 3.72-2.18 2.23a.85.85 0 00-.24.61.83.83 0 00.85.84zM.86 8.27h12.35l3.15-.2c.4-.02.67-.27.67-.67 0-.4-.27-.64-.67-.67l-3.15-.2H.86A.8.8 0 000 7.4c0 .51.35.87.86.87z" fill="currentColor" opacity=".85"/></svg></span>
    </a>
  </div>
</main>

<footer class="years-strip" id="yearsStrip" aria-hidden="true"></footer>

<a class="skip-link" id="skipLink" href="/app.html">Skip</a>

<script>
(function(){
"use strict";

var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ── Mouse parallax on background gradient ───────────── */
if (!reducedMotion) {
  var bodyEl = document.body;
  var mx = 0.5, my = 0.5, tmx = 0.5, tmy = 0.5, parallaxActive = true;
  document.addEventListener("mousemove", function(e) {
    tmx = e.clientX / window.innerWidth;
    tmy = e.clientY / window.innerHeight;
  });
  (function updateParallax() {
    if (!parallaxActive) return;
    mx += (tmx - mx) * 0.05;
    my += (tmy - my) * 0.05;
    bodyEl.style.setProperty("--mx", mx);
    bodyEl.style.setProperty("--my", my);
    requestAnimationFrame(updateParallax);
  })();
}

/* ── Loader counter ─────────────────────────────────── */
var years = [1934,1938,1950,1954,1958,1962,1966,1970,1974,1978,1982,
             1986,1990,1994,1998,2002,2006,2010,2014,2018,2022,2026];

var loaderEl    = document.getElementById("loader");
var yearEl      = document.getElementById("loaderYear");
var barEl       = document.getElementById("loaderBar");
var titleBlock  = document.getElementById("titleBlock");
var titleEl     = document.getElementById("title");
var ctaEl       = document.getElementById("cta");
var yearsStrip  = document.getElementById("yearsStrip");
var skipLink    = document.getElementById("skipLink");

/* Build bottom strip */
var stripHTML = "";
for (var i = 0; i < years.length; i++) {
  stripHTML += years[i] === 2026
    ? '<span class="yr-live"><span class="live-dot"></span>' + years[i] + '</span>'
    : '<span>' + years[i] + '</span>';
}
yearsStrip.innerHTML = stripHTML;

/* Build title with per-character spans */
var titleChars = "The Road to Glory".split("");
var titleHTML = "";
for (var i = 0; i < titleChars.length; i++) {
  titleHTML += '<span class="char">' + (titleChars[i] === " " ? "&nbsp;" : titleChars[i]) + '</span>';
  if (i === 7) titleHTML += '<span class="title-br" aria-hidden="true"></span>';
}
titleEl.innerHTML = titleHTML;
var charSpans = titleEl.querySelectorAll(".char");

/* ── Skip link ──────────────────────────────────────── */
function goToApp() {
  parallaxActive = false;
  document.body.classList.add("exiting");
  setTimeout(function() { window.location.href = "/app.html"; }, 900);
}
skipLink.addEventListener("click", function(e) { e.preventDefault(); goToApp(); });

/* ── Loader animation ───────────────────────────────── */
if (reducedMotion) {
  yearEl.textContent = "2026";
  barEl.style.width = "100%";
  finishLoader();
} else {
  var idx = 0, baseDelay = 180, minDelay = 50;
  (function tick() {
    if (idx >= years.length) { finishLoader(); return; }
    yearEl.textContent = years[idx];
    barEl.style.width = ((idx + 1) / years.length * 100) + "%";
    idx++;
    var delay = baseDelay - (baseDelay - minDelay) * (idx / years.length);
    setTimeout(tick, delay);
  })();
}

function finishLoader() {
  loaderEl.classList.add("hidden");
  titleBlock.classList.add("visible");
  ctaEl.setAttribute("tabindex", "0");
  skipLink.style.opacity = "0";
  skipLink.style.pointerEvents = "none";

  for (var i = 0; i < charSpans.length; i++) {
    if (reducedMotion) {
      charSpans[i].classList.add("show");
    } else {
      charSpans[i].style.transitionDelay = (i * 0.045) + "s";
      charSpans[i].classList.add("show");
    }
  }
  if (reducedMotion) focusCTA();
  else setTimeout(focusCTA, 800);
}

function focusCTA() {
  var isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
  if (!isTouch) ctaEl.focus({ preventScroll: true });
}

/* ── CTA exit transition ────────────────────────────── */
ctaEl.addEventListener("click", function(e) {
  e.preventDefault();
  goToApp();
});

ctaEl.addEventListener("keydown", function(e) {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); ctaEl.click(); }
});

})();
</script>

</body>
